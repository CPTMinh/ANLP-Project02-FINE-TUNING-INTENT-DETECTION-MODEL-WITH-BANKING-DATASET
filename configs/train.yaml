# configs/train.yaml
model_name: "unsloth/llama-3-8b-bnb-4bit" # Base model
max_seq_length: 128                       # Maximum sequence length (banking intents are usually short text)
num_labels: 77                            # BANKING77 has 77 distinct intent classes

# Training Hyperparameters
batch_size: 16                            # Batch size for training
learning_rate: 2.0e-4                     # Learning rate
optimizer: "adamw_8bit"                   # Optimizer (8-bit AdamW saves memory in Colab)
epochs: 3                                 # Number of training epochs

# Regularization / LoRA Config
lora_r: 16                                # Rank for LoRA
lora_alpha: 16                            # Alpha parameter for LoRA scaling
lora_dropout: 0.1                         # Regularization technique: Dropout rate
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Output
output_dir: "outputs"
save_model_path: "saved_model"